<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles.css"/>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>

    <title>AI Poem generator</title>
    
</head>
<body>
    <div class="generator"> 
   <header>
    AI Poem Generator
   </header> 
   <main>
    <form>
        <input type="text" placeholder="Enter the topic of poem" autofocus  required  autocomplete="off"
        class="instructions"/>
        <input type="submit" class="button-press" />

    </form id="poem-generator-form">
    <div class="poems" id="poem-ai">
        
    </div>
   </main>
   <footer>
    This project was coded by <a href="https://github.com/rethabilemanyanye4-coder" target="_blank">Rethabile Manyanye</a> and is  <a href="https://github.com/rethabilemanyanye4-coder/my-poems-generator" target="_blank">open-sourced on Github</a> and is hosted on <a href="https://poem-ai.netlify.app/" target="_blank">Netlify</a>
   </footer> 
   </div>
  <script src="src/index.js"></script>  
</body>
</html>
